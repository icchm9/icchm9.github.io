<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>隨機飲料組合</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <p class="eyebrow">drink-web</p>
        <h1>隨機飲料組合</h1>
        <p class="intro">新增茶底與配料，隨機產生今天的飲料。</p>
      </header>

      <section class="app-grid" aria-label="飲料組合工具">
        <div class="manage-column">
          <section class="panel list-panel" aria-labelledby="bases-title">
            <div class="panel-heading">
              <h2 id="bases-title">茶底</h2>
              <span class="count-pill" id="base-count">0</span>
            </div>
            <div class="chip-list" id="base-list" aria-live="polite"></div>
            <form class="add-form" id="base-form">
              <label class="visually-hidden" for="base-input">新增茶底</label>
              <input id="base-input" type="text" autocomplete="off" placeholder="例如：烏龍茶">
              <button type="submit">新增</button>
            </form>
          </section>

          <section class="panel list-panel" aria-labelledby="toppings-title">
            <div class="panel-heading">
              <h2 id="toppings-title">配料</h2>
              <span class="count-pill" id="topping-count">0</span>
            </div>
            <div class="chip-list" id="topping-list" aria-live="polite"></div>
            <form class="add-form" id="topping-form">
              <label class="visually-hidden" for="topping-input">新增配料</label>
              <input id="topping-input" type="text" autocomplete="off" placeholder="例如：珍珠">
              <button type="submit">新增</button>
            </form>
          </section>
        </div>

        <aside class="control-column">
          <section class="panel result-panel" aria-labelledby="result-title">
            <div class="drink-visual" aria-hidden="true">
              <div class="cup">
                <span></span>
                <span></span>
                <span></span>
              </div>
            </div>
            <p id="result-title" class="result-label">今天喝</p>
            <output class="result-text" id="result-output">點一下產生飲料</output>
          </section>

          <section class="panel control-panel" aria-labelledby="controls-title">
            <h2 id="controls-title">搭配設定</h2>
            <label class="field-label" for="combo-count">搭配數量</label>
            <input id="combo-count" type="number" min="1" value="2" inputmode="numeric">
            <button class="primary-button" id="generate-button" type="button">隨機產生</button>
            <p class="notice" id="notice" role="status" aria-live="polite"></p>
          </section>

          <button class="ghost-button reset-button" id="reset-button" type="button">重置預設</button>
        </aside>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
